<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Rich gold gradient -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE082" />
      <stop offset="25%" stop-color="#D4AF37" />
      <stop offset="50%" stop-color="#FFF0B3" />
      <stop offset="75%" stop-color="#AA7C11" />
      <stop offset="100%" stop-color="#FDF0D5" />
    </linearGradient>
    <!-- Drop shadow for 3D overlap effect -->
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000000" flood-opacity="0.8"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#121212" />
  
  <!-- Subtle background glow behind the knot -->
  <circle cx="256" cy="256" r="120" fill="#D4AF37" opacity="0.15" filter="blur(40px)" />

  <g transform="translate(256, 280)" filter="url(#shadow)">
    <!-- Base Rings -->
    <!-- Left Ring -->
    <circle cx="-65" cy="0" r="75" stroke="url(#gold)" stroke-width="26" fill="none" />
    
    <!-- Right Ring -->
    <circle cx="65" cy="0" r="75" stroke="url(#gold)" stroke-width="26" fill="none" />
    
    <!-- Redraw part of the Left Ring to weave over the Right Ring at the bottom -->
    <path d="M-65,75 A75,75 0 0,1 -65,-75" stroke="url(#gold)" stroke-width="26" fill="none" stroke-linecap="round"/>

    <!-- The swooping knot that mimics the exact 3D design from the top-left option -->
    <!-- Part 1: From Left Ring inner edge, sweeping UP and RIGHT, crossing center -->
    <path d="M10,0 C10,-100 -90,-130 -45,-190 C-30,-210 -10,-218 0,-218" 
          stroke="url(#gold)" stroke-width="26" fill="none" stroke-linecap="round" />

    <!-- Part 2: From Top Apex, looping down LEFT, crossing center to Right Ring inner edge -->
    <!-- This is drawn AFTER Part 1, so it crosses OVER Part 1 in the center! Perfect weaving. -->
    <path d="M0,-218 C10,-218 30,-210 45,-190 C90,-130 -10,-100 -10,0" 
          stroke="url(#gold)" stroke-width="26" fill="none" stroke-linecap="round" />

    <!-- Fleur-de-lis Top Flourish -->
    <g transform="translate(0, -10)">
      <!-- Center Spire -->
      <path d="M0,-200 C15,-230 18,-250 0,-270 C-18,-250 -15,-230 0,-200 Z" fill="url(#gold)" />
      <!-- Left Curl -->
      <path d="M-8,-220 C-35,-220 -45,-250 -25,-265 C-15,-275 0,-245 -3,-235" stroke="url(#gold)" stroke-width="10" fill="none" stroke-linecap="round" />
      <!-- Right Curl -->
      <path d="M8,-220 C35,-220 45,-250 25,-265 C15,-275 0,-245 3,-235" stroke="url(#gold)" stroke-width="10" fill="none" stroke-linecap="round" />
    </g>
  </g>
</svg>
