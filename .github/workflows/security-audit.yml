name: 🔐 Security Vulnerability Audit

on:
  pull_request:
    branches: [main, master, develop, release/*]
    types: [opened, synchronize, reopened]
  push:
    branches: [main, master, develop]
  workflow_dispatch:
    inputs:
      severity_threshold:
        description: 'Block on severity level (critical|high|moderate|low)'
        required: false
        default: 'high'

# Block concurrent runs on same branch to avoid race conditions
concurrency:
  group: security-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Root workspace audit
  # ─────────────────────────────────────────────
  audit-root:
    name: 🔍 Root & Backend Audit
    runs-on: ubuntu-latest
    outputs:
      vuln_count: ${{ steps.audit.outputs.vuln_count }}
      high_count: ${{ steps.audit.outputs.high_count }}
      critical_count: ${{ steps.audit.outputs.critical_count }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts --legacy-peer-deps

      - name: Run npm audit (root)
        id: audit
        run: |
          set +e
          AUDIT_JSON=$(npm audit --json 2>/dev/null)
          EXIT_CODE=$?
          
          # Parse counts
          CRITICAL=$(echo "$AUDIT_JSON" | node -e "
            const fs = require('fs');
            const data = fs.readFileSync(0, 'utf8');
            try {
              const d = JSON.parse(data);
              const m = d.metadata?.vulnerabilities || {};
              console.log(m.critical || 0);
            } catch (e) {
              console.log(0);
            }
          ")
          HIGH=$(echo "$AUDIT_JSON" | node -e "
            const fs = require('fs');
            const data = fs.readFileSync(0, 'utf8');
            try {
              const d = JSON.parse(data);
              const m = d.metadata?.vulnerabilities || {};
              console.log(m.high || 0);
            } catch (e) {
              console.log(0);
            }
          ")
          MODERATE=$(echo "$AUDIT_JSON" | node -e "
            const fs = require('fs');
            const data = fs.readFileSync(0, 'utf8');
            try {
              const d = JSON.parse(data);
              const m = d.metadata?.vulnerabilities || {};
              console.log(m.moderate || 0);
            } catch (e) {
              console.log(0);
            }
          ")
          LOW=$(echo "$AUDIT_JSON" | node -e "
            const fs = require('fs');
            const data = fs.readFileSync(0, 'utf8');
            try {
              const d = JSON.parse(data);
              const m = d.metadata?.vulnerabilities || {};
              console.log(m.low || 0);
            } catch (e) {
              console.log(0);
            }
          ")
          TOTAL=$((CRITICAL + HIGH + MODERATE + LOW))
          
          echo "vuln_count=$TOTAL"     >> "$GITHUB_OUTPUT"
          echo "high_count=$HIGH"      >> "$GITHUB_OUTPUT"
          echo "critical_count=$CRITICAL" >> "$GITHUB_OUTPUT"

          echo "## 🔐 Root Audit Results" >> "$GITHUB_STEP_SUMMARY"
          echo "| Severity | Count |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🔴 Critical | $CRITICAL |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🟠 High | $HIGH |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🟡 Moderate | $MODERATE |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🔵 Low | $LOW |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          # Print human-readable audit
          npm audit --audit-level=low 2>&1 || true
          
          # BLOCK on critical or high
          THRESHOLD="${{ github.event.inputs.severity_threshold || 'high' }}"
          if [ "$THRESHOLD" = "critical" ] && [ "$CRITICAL" -gt 0 ]; then
            echo "❌ BLOCKED: $CRITICAL critical vulnerabilities found!"
            exit 1
          elif [ "$THRESHOLD" = "high" ] && [ $((CRITICAL + HIGH)) -gt 0 ]; then
            echo "❌ BLOCKED: $CRITICAL critical + $HIGH high vulnerabilities found!"
            exit 1
          elif [ "$THRESHOLD" = "moderate" ] && [ $((CRITICAL + HIGH + MODERATE)) -gt 0 ]; then
            echo "❌ BLOCKED: $((CRITICAL + HIGH + MODERATE)) moderate+ vulnerabilities found!"
            exit 1
          fi
          echo "✅ No blocking vulnerabilities detected (threshold: $THRESHOLD)"

  # ─────────────────────────────────────────────
  # JOB 2: Frontend workspace audit
  # ─────────────────────────────────────────────
  audit-frontend:
    name: 🎨 Frontend Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts --legacy-peer-deps

      - name: Run npm audit (frontend)
        run: |
          set +e
          AUDIT_JSON=$(npm audit --workspace=shaadi-mantra-frontend --json 2>/dev/null)
          
          CRITICAL=$(echo "$AUDIT_JSON" | node -e "
            const fs = require('fs');
            const data = fs.readFileSync(0, 'utf8');
            try {
              const d = JSON.parse(data);
              const m = d.metadata?.vulnerabilities || {};
              console.log(m.critical || 0);
            } catch (e) {
              console.log(0);
            }
          ")
          HIGH=$(echo "$AUDIT_JSON" | node -e "
            const fs = require('fs');
            const data = fs.readFileSync(0, 'utf8');
            try {
              const d = JSON.parse(data);
              const m = d.metadata?.vulnerabilities || {};
              console.log(m.high || 0);
            } catch (e) {
              console.log(0);
            }
          ")
          MODERATE=$(echo "$AUDIT_JSON" | node -e "
            const fs = require('fs');
            const data = fs.readFileSync(0, 'utf8');
            try {
              const d = JSON.parse(data);
              const m = d.metadata?.vulnerabilities || {};
              console.log(m.moderate || 0);
            } catch (e) {
              console.log(0);
            }
          ")
          LOW=$(echo "$AUDIT_JSON" | node -e "
            const fs = require('fs');
            const data = fs.readFileSync(0, 'utf8');
            try {
              const d = JSON.parse(data);
              const m = d.metadata?.vulnerabilities || {};
              console.log(m.low || 0);
            } catch (e) {
              console.log(0);
            }
          ")

          echo "## 🎨 Frontend Audit Results" >> "$GITHUB_STEP_SUMMARY"
          echo "| Severity | Count |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🔴 Critical | $CRITICAL |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🟠 High | $HIGH |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🟡 Moderate | $MODERATE |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🔵 Low | $LOW |" >> "$GITHUB_STEP_SUMMARY"

          npm audit --workspace=shaadi-mantra-frontend --audit-level=low 2>&1 || true

          if [ $((CRITICAL + HIGH)) -gt 0 ]; then
            echo "❌ BLOCKED: $CRITICAL critical + $HIGH high vulnerabilities in frontend!"
            exit 1
          fi
          echo "✅ Frontend: No critical/high vulnerabilities"

  # ─────────────────────────────────────────────
  # JOB 3: Backend workspace audit
  # ─────────────────────────────────────────────
  audit-backend:
    name: ⚙️ Backend Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts --legacy-peer-deps

      - name: Run npm audit (backend)
        run: |
          set +e
          AUDIT_JSON=$(npm audit --workspace=shaadimantra-backend --json 2>/dev/null)
          
          CRITICAL=$(echo "$AUDIT_JSON" | node -e "
            const fs = require('fs');
            const data = fs.readFileSync(0, 'utf8');
            try {
              const d = JSON.parse(data);
              const m = d.metadata?.vulnerabilities || {};
              console.log(m.critical || 0);
            } catch (e) {
              console.log(0);
            }
          ")
          HIGH=$(echo "$AUDIT_JSON" | node -e "
            const fs = require('fs');
            const data = fs.readFileSync(0, 'utf8');
            try {
              const d = JSON.parse(data);
              const m = d.metadata?.vulnerabilities || {};
              console.log(m.high || 0);
            } catch (e) {
              console.log(0);
            }
          ")
          MODERATE=$(echo "$AUDIT_JSON" | node -e "
            const fs = require('fs');
            const data = fs.readFileSync(0, 'utf8');
            try {
              const d = JSON.parse(data);
              const m = d.metadata?.vulnerabilities || {};
              console.log(m.moderate || 0);
            } catch (e) {
              console.log(0);
            }
          ")
          LOW=$(echo "$AUDIT_JSON" | node -e "
            const fs = require('fs');
            const data = fs.readFileSync(0, 'utf8');
            try {
              const d = JSON.parse(data);
              const m = d.metadata?.vulnerabilities || {};
              console.log(m.low || 0);
            } catch (e) {
              console.log(0);
            }
          ")

          echo "## ⚙️ Backend Audit Results" >> "$GITHUB_STEP_SUMMARY"
          echo "| Severity | Count |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🔴 Critical | $CRITICAL |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🟠 High | $HIGH |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🟡 Moderate | $MODERATE |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🔵 Low | $LOW |" >> "$GITHUB_STEP_SUMMARY"

          npm audit --workspace=shaadimantra-backend --audit-level=low 2>&1 || true

          if [ $((CRITICAL + HIGH)) -gt 0 ]; then
            echo "❌ BLOCKED: $CRITICAL critical + $HIGH high vulnerabilities in backend!"
            exit 1
          fi
          echo "✅ Backend: No critical/high vulnerabilities"

  # ─────────────────────────────────────────────
  # JOB 4: Auto-fix attempt (on push to main only)
  # ─────────────────────────────────────────────
  auto-fix:
    name: 🔧 Auto-Fix & Commit
    runs-on: ubuntu-latest
    needs: [audit-root, audit-frontend, audit-backend]
    if: |
      failure() &&
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Attempt auto-fix
        run: |
          echo "🔧 Running security auto-fix script..."
          chmod +x scripts/security-audit-fix.sh
          bash scripts/security-audit-fix.sh --auto-fix
        continue-on-error: true

      - name: Commit fixed lockfiles
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package-lock.json || true
          git add package.json frontend/package.json backend/package.json || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(security): auto-fix npm vulnerabilities [skip ci]"
            git push
          fi

  # ─────────────────────────────────────────────
  # JOB 5: Final gate — summary
  # ─────────────────────────────────────────────
  security-gate:
    name: ✅ Security Gate
    runs-on: ubuntu-latest
    needs: [audit-root, audit-frontend, audit-backend]
    if: always()
    steps:
      - name: Evaluate gate
        run: |
          ROOT_RESULT="${{ needs.audit-root.result }}"
          FE_RESULT="${{ needs.audit-frontend.result }}"
          BE_RESULT="${{ needs.audit-backend.result }}"
          
          echo "## 🔐 Security Gate Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Workspace | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Root/Backend | $ROOT_RESULT |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Frontend | $FE_RESULT |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Backend | $BE_RESULT |" >> "$GITHUB_STEP_SUMMARY"
          
          if [ "$ROOT_RESULT" = "failure" ] || [ "$FE_RESULT" = "failure" ] || [ "$BE_RESULT" = "failure" ]; then
            echo ""  >> "$GITHUB_STEP_SUMMARY"
            echo "### ❌ MERGE BLOCKED — Resolve vulnerabilities before merging" >> "$GITHUB_STEP_SUMMARY"
            echo "Run \`bash scripts/security-audit-fix.sh\` locally to auto-fix." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### ✅ All security checks passed — Safe to merge" >> "$GITHUB_STEP_SUMMARY"
