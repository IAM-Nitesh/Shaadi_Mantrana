name: Android Build & Deploy to Play Store

env:
  NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
  NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
  NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
  NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
  NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
  GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
  ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
  ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
  ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
  ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
  GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
  VERSION_CODE: 0
  VERSION_NAME: unknown

# Explicit least-privilege permissions (security best practice)
# See: https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#permissions
permissions:
  contents: read     # Needed to checkout the repository
  actions: write     # Needed to upload build artifacts

on:
  push:
    branches:
      - main          # Auto-deploy to Internal Testing on every main push
    tags:
      - 'v*'          # Deploy to Production when you push a version tag e.g. v1.1.0
  workflow_dispatch:  # Allow manual trigger from GitHub UI

# Cancel any in-progress run on the same branch to avoid duplicate builds
concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build & Deploy Android AAB
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # ─── 1. Checkout Code ──────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for version calculation

      # ─── 2. Set up Node.js ─────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ─── 3. Set up Java (required for Android build) ───────────────────────
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      # ─── 4. Cache Gradle for faster builds ─────────────────────────────────
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # ─── 5. Install all dependencies (root + all workspaces) ────────────────
      # Running npm ci once at the root is correct for npm workspaces.
      # A second npm ci inside frontend/ would create an isolated node_modules
      # that breaks workspace module hoisting (causes "firebase/auth not found").
      - name: Install all dependencies
        run: npm ci

      # ─── 6. Build Next.js frontend (static export) ─────────────────────────
      - name: Build frontend
        run: npm run build
        working-directory: frontend

      # ─── 8. Restore google-services.json (excluded from git) ───────────────
      - name: Restore google-services.json
        run: |
          echo "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
          echo "✅ google-services.json restored"

      # ─── 9. Restore keystore from GitHub Secret ─────────────────────────────
      - name: Restore release keystore
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/shaadi-mantrana-release.jks
          echo "✅ Keystore restored"

      # ─── 10. Auto-increment versionCode ────────────────────────────────────
      #  Uses the total number of git commits as the versionCode.
      #  This guarantees it always increases and is reproducible.
      - name: Set versionCode from git commit count
        run: |
          VERSION_CODE=$(git rev-list --count HEAD)
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
          echo "📦 versionCode set to: $VERSION_CODE"

      # Determine versionName: use git tag if available, else "1.x.{run_number}"
      - name: Set versionName
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION_NAME="${{ github.ref_name }}"          # e.g. "v1.1.0" → strip the v
            VERSION_NAME="${VERSION_NAME#v}"
          else
            VERSION_NAME="1.0.${{ github.run_number }}"   # e.g. "1.0.42"
          fi
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "📦 versionName set to: $VERSION_NAME"

      # ─── 11. Patch build.gradle with computed version ──────────────────────
      - name: Update build.gradle versions
        run: |
          sed -i "s/versionCode [0-9]*/versionCode $VERSION_CODE/" android/app/build.gradle
          sed -i "s/versionName \".*\"/versionName \"$VERSION_NAME\"/" android/app/build.gradle
          echo "✅ build.gradle patched:"
          grep -E "versionCode|versionName" android/app/build.gradle

      # ─── 12. Sync Capacitor web assets into Android ────────────────────────
      - name: Sync Capacitor
        run: npx cap sync android

      # ─── 13. Make gradlew executable ───────────────────────────────────────
      - name: Grant Gradle execute permission
        run: chmod +x android/gradlew

      # ─── 14. Build signed release AAB ──────────────────────────────────────
      - name: Build release AAB
        run: ./gradlew bundleRelease --no-daemon
        working-directory: android
        env:
          ANDROID_KEYSTORE_FILE: ../shaadi-mantrana-release.jks

      # ─── 15. Upload AAB as GitHub artifact (always saved for download) ──────
      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ env.VERSION_NAME }}-(${{ env.VERSION_CODE }})
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      # ─── 16. Deploy to Play Store ──────────────────────────────────────────
      #  Pushes to Internal Testing on every main push.
      #  Pushes to Production when a version tag (v*) is pushed.
      - name: Deploy to Play Store (Internal Testing)
        if: github.ref == 'refs/heads/main'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ env.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.shaadimantrana.app
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
          whatsNewDirectory: distribution/whatsnew   # optional release notes folder

      - name: Deploy to Play Store (Production)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ env.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.shaadimantrana.app
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: production
          status: completed
          whatsNewDirectory: distribution/whatsnew

      # ─── 17. Summary ────────────────────────────────────────────────────────
      - name: Build summary
        if: always()
        run: |
          echo "## 🚀 Android Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Version Name | $VERSION_NAME |" >> $GITHUB_STEP_SUMMARY
          echo "| Version Code | $VERSION_CODE |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch/Tag | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Track | ${{ startsWith(github.ref, 'refs/tags/v') && 'production' || 'internal' }} |" >> $GITHUB_STEP_SUMMARY
