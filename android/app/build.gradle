apply plugin: 'com.android.application'

def localKeystorePropertiesFile = rootProject.file('keystore.properties')
def localKeystoreProperties = new Properties()
if (localKeystorePropertiesFile.exists()) {
    localKeystorePropertiesFile.withInputStream { localKeystoreProperties.load(it) }
}

def releaseStoreFile = System.getenv('ANDROID_KEYSTORE_FILE') ?: localKeystoreProperties['storeFile']
def releaseStorePassword = System.getenv('ANDROID_KEYSTORE_PASSWORD') ?: localKeystoreProperties['storePassword']
def releaseKeyAlias = System.getenv('ANDROID_KEY_ALIAS') ?: localKeystoreProperties['keyAlias']
def releaseKeyPassword = System.getenv('ANDROID_KEY_PASSWORD') ?: localKeystoreProperties['keyPassword']
def hasReleaseSigning = releaseStoreFile && releaseStorePassword && releaseKeyAlias && releaseKeyPassword

android {
    namespace "com.shaadimantrana.app"
    compileSdk rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.shaadimantrana.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 6
        versionName "1.0.5"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        release {
            if (hasReleaseSigning) {
                storeFile file(releaseStoreFile)
                storePassword releaseStorePassword
                keyAlias releaseKeyAlias
                keyPassword releaseKeyPassword
            }
        }
    }
    buildTypes {
        debug {
            // WebView debugging allowed only in debug builds
            // (controlled via capacitor.config.json webContentsDebuggingEnabled: false for release)
            minifyEnabled false
        }
        release {
            // Enable R8 minification + obfuscation for release
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            if (hasReleaseSigning) {
                signingConfig signingConfigs.release
            } else {
                logger.warn("Release signing is not configured. Set ANDROID_KEYSTORE_FILE, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, and ANDROID_KEY_PASSWORD, or create ignored android/keystore.properties.")
            }
        }
    }
    buildFeatures {
        buildConfig = true
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_21
        targetCompatibility JavaVersion.VERSION_21
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
    // Firebase BOM — keeps all Firebase dependencies version-consistent
    implementation platform('com.google.firebase:firebase-bom:34.0.0')
    implementation 'com.google.firebase:firebase-crashlytics'
    implementation 'com.google.firebase:firebase-analytics'
    // Firebase Phone Auth — native Android SDK (no ReCAPTCHA, uses Play Integrity)
    implementation 'com.google.firebase:firebase-auth'
    // Firebase App Check — verifies requests come from your genuine app binary
    implementation 'com.google.firebase:firebase-appcheck-playintegrity'
    implementation 'com.google.firebase:firebase-appcheck-debug'
}

apply from: 'capacitor.build.gradle'
apply plugin: 'com.google.gms.google-services'
apply plugin: 'com.google.firebase.crashlytics'
